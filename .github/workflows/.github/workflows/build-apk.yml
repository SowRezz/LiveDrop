name: Build LiveDrop APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Unzip project
        run: unzip livedrop_final.zip -d extracted/
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      - name: Build APK
        working-directory: extracted/livedrop
        run: |
          mkdir -p assets/images assets/icons
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveDrop-APK
          path: extracted/livedrop/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
