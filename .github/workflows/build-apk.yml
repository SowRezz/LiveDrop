name: Build LiveDrop APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
      - name: Build LiveDrop
        run: |
          flutter create livedrop
          cd livedrop
          flutter pub add go_router provider google_fonts qr_flutter shared_preferences fl_chart intl uuid
          mkdir -p assets/images assets/icons
          cat > lib/main.dart << 'DART'
import 'package:flutter/material.dart';
import 'package:flutter/services.dart';
import 'package:google_fonts/google_fonts.dart';
import 'package:provider/provider.dart';
import 'package:go_router/go_router.dart';

void main() {
  WidgetsFlutterBinding.ensureInitialized();
  SystemChrome.setPreferredOrientations([DeviceOrientation.portraitUp]);
  SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
    statusBarColor: Colors.transparent,
    statusBarIconBrightness: Brightness.light,
  ));
  runApp(
    MultiProvider(
      providers: [
        ChangeNotifierProvider(create: (_) => AppState()),
      ],
      child: const LiveDropApp(),
    ),
  );
}

// ─── COLORS ───────────────────────────────
class C {
  static const bg = Color(0xFF080C14);
  static const s1 = Color(0xFF0D1220);
  static const s2 = Color(0xFF131926);
  static const s3 = Color(0xFF1A2235);
  static const cyan = Color(0xFF00C8FF);
  static const yellow = Color(0xFFF5E642);
  static const green = Color(0xFF00F59B);
  static const red = Color(0xFFFF3D5A);
  static const orange = Color(0xFFFF8C42);
  static const purple = Color(0xFF8B5CF6);
  static const t1 = Color(0xFFDCE4F0);
  static const t2 = Color(0xFF5E6E8A);
  static const t3 = Color(0xFF3A4560);
  static const border = Color(0x12FFFFFF);
  static const dark = Color(0xFF060C16);
}

// ─── STATE ────────────────────────────────
enum Role { client, driver }
enum DeliveryStatus { idle, searching, active, delivered }

class DeliveryData {
  final String pickup;
  final String dropoff;
  final String type;
  final double price;
  final double driverEarnings;
  DeliveryData({required this.pickup, required this.dropoff, required this.type, required this.price, required this.driverEarnings});
}

class AppState extends ChangeNotifier {
  Role role = Role.client;
  bool isLoggedIn = false;
  bool driverOnline = true;
  DeliveryStatus deliveryStatus = DeliveryStatus.idle;
  DeliveryData? activeDelivery;
  double driverEarnings = 47.50;
  int driverDeliveries = 6;
  double clientRating = 0;
  List<Map<String, dynamic>> history = [
    {'from': 'Bastille', 'to': 'Opéra', 'type': '📦', 'price': 8.06, 'min': 18},
    {'from': 'Nation', 'to': 'Vincennes', 'type': '🍔', 'price': 12.30, 'min': 22},
    {'from': 'IKEA', 'to': 'Montreuil', 'type': '🛋️', 'price': 45.00, 'min': 45},
  ];

  void login(Role r) { role = r; isLoggedIn = true; notifyListeners(); }
  void logout() { isLoggedIn = false; notifyListeners(); }
  void toggleDriverOnline() { driverOnline = !driverOnline; notifyListeners(); }
  void createDelivery(String a, String b, String type, double price) {
    activeDelivery = DeliveryData(pickup: a, dropoff: b, type: type, price: price, driverEarnings: price * 0.8);
    deliveryStatus = DeliveryStatus.searching;
    notifyListeners();
    Future.delayed(const Duration(seconds: 3), () {
      deliveryStatus = DeliveryStatus.active;
      notifyListeners();
    });
  }
  void completeDelivery() {
    if (activeDelivery != null) {
      history.insert(0, {'from': activeDelivery!.pickup, 'to': activeDelivery!.dropoff, 'type': activeDelivery!.type, 'price': activeDelivery!.price, 'min': 18});
      driverEarnings += activeDelivery!.driverEarnings;
      driverDeliveries++;
    }
    deliveryStatus = DeliveryStatus.delivered;
    notifyListeners();
  }
  void resetDelivery() { deliveryStatus = DeliveryStatus.idle; activeDelivery = null; notifyListeners(); }
  void setRating(double r) { clientRating = r; notifyListeners(); }
}

// ─── ROUTER ───────────────────────────────
class LiveDropApp extends StatelessWidget {
  const LiveDropApp({super.key});

  @override
  Widget build(BuildContext context) {
    final state = context.watch<AppState>();
    final router = GoRouter(
      initialLocation: '/splash',
      routes: [
        GoRoute(path: '/splash', builder: (_, __) => const SplashScreen()),
        GoRoute(path: '/login', builder: (_, __) => const LoginScreen()),
        GoRoute(path: '/client', builder: (_, __) => const ClientHome()),
        GoRoute(path: '/client/create', builder: (_, __) => const CreateDelivery()),
        GoRoute(path: '/client/finding', builder: (_, __) => const FindingScreen()),
        GoRoute(path: '/client/tracking', builder: (_, __) => const TrackingScreen()),
        GoRoute(path: '/client/delivered', builder: (_, __) => const DeliveredScreen()),
        GoRoute(path: '/client/history', builder: (_, __) => const HistoryScreen()),
        GoRoute(path: '/driver', builder: (_, __) => const DriverHome()),
        GoRoute(path: '/driver/mission', builder: (_, __) => const MissionDetail()),
        GoRoute(path: '/driver/earnings', builder: (_, __) => const EarningsScreen()),
        GoRoute(path: '/driver/profile', builder: (_, __) => const DriverProfile()),
      ],
    );

    return MaterialApp.router(
      title: 'LiveDrop',
      debugShowCheckedModeBanner: false,
      routerConfig: router,
      theme: ThemeData(
        useMaterial3: true,
        brightness: Brightness.dark,
        scaffoldBackgroundColor: C.bg,
        colorScheme: const ColorScheme.dark(
          background: C.bg, surface: C.s1, primary: C.cyan,
          secondary: C.yellow, error: C.red, onPrimary: C.dark,
        ),
        textTheme: GoogleFonts.dmSansTextTheme(ThemeData.dark().textTheme),
        appBarTheme: AppBarTheme(
          backgroundColor: C.bg, elevation: 0,
          titleTextStyle: GoogleFonts.syne(fontSize: 18, fontWeight: FontWeight.w700, color: C.t1),
          systemOverlayStyle: const SystemUiOverlayStyle(statusBarColor: Colors.transparent, statusBarIconBrightness: Brightness.light),
        ),
        inputDecorationTheme: InputDecorationTheme(
          filled: true, fillColor: C.s2,
          border: OutlineInputBorder(borderRadius: BorderRadius.circular(10), borderSide: const BorderSide(color: C.border)),
          enabledBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(10), borderSide: const BorderSide(color: C.border)),
          focusedBorder: OutlineInputBorder(borderRadius: BorderRadius.circular(10), borderSide: const BorderSide(color: C.cyan, width: 1.5)),
          hintStyle: const TextStyle(color: C.t3),
          contentPadding: const EdgeInsets.symmetric(horizontal: 14, vertical: 12),
        ),
      ),
    );
  }
}

// ─── WIDGETS ──────────────────────────────
class LDBtn extends StatelessWidget {
  final String label;
  final VoidCallback? onTap;
  final Color? bg;
  final bool outline;
  final bool loading;
  const LDBtn({super.key, required this.label, this.onTap, this.bg, this.outline = false, this.loading = false});

  @override
  Widget build(BuildContext ctx) {
    final color = bg ?? (outline ? Colors.transparent : C.cyan);
    final fg = outline ? C.t2 : C.dark;
    return GestureDetector(
      onTap: loading ? null : onTap,
      child: Container(
        width: double.infinity, height: 50,
        decoration: BoxDecoration(
          color: color, borderRadius: BorderRadius.circular(10),
          border: outline ? Border.all(color: C.border) : null,
          boxShadow: !outline && onTap != null ? [BoxShadow(color: color.withOpacity(0.25), blurRadius: 12, offset: const Offset(0, 4))] : null,
        ),
        child: Center(
          child: loading
            ? const SizedBox(width: 20, height: 20, child: CircularProgressIndicator(strokeWidth: 2, color: C.dark))
            : Text(label, style: GoogleFonts.syne(fontSize: 14, fontWeight: FontWeight.w700, color: fg, letterSpacing: 0.4)),
        ),
      ),
    );
  }
}

class LDCard extends StatelessWidget {
  final Widget child;
  final VoidCallback? onTap;
  final Color? borderColor;
  final Color? bg;
  const LDCard({super.key, required this.child, this.onTap, this.borderColor, this.bg});

  @override
  Widget build(BuildContext ctx) => GestureDetector(
    onTap: onTap,
    child: Container(
      margin: const EdgeInsets.only(bottom: 10),
      padding: const EdgeInsets.all(14),
      decoration: BoxDecoration(
        color: bg ?? C.s2, borderRadius: BorderRadius.circular(16),
        border: Border.all(color: borderColor ?? C.border),
      ),
      child: child,
    ),
  );
}

class LDTag extends StatelessWidget {
  final String label;
  final Color color;
  const LDTag(this.label, this.color, {super.key});

  @override
  Widget build(BuildContext ctx) => Container(
    padding: const EdgeInsets.symmetric(horizontal: 8, vertical: 3),
    decoration: BoxDecoration(color: color.withOpacity(0.12), borderRadius: BorderRadius.circular(20), border: Border.all(color: color.withOpacity(0.25))),
    child: Text(label, style: GoogleFonts.spaceMono(fontSize: 10, color: color)),
  );
}

Widget syne(String t, double s, FontWeight w, Color c) => Text(t, style: GoogleFonts.syne(fontSize: s, fontWeight: w, color: c));
Widget mono(String t, {double s = 10, Color c = C.t2}) => Text(t, style: GoogleFonts.spaceMono(fontSize: s, color: c));

