name: Build LiveDrop APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip livedrop.zip -d ex/
      - name: Fix pubspec
        working-directory: ex/livedrop
        run: |
          cat > pubspec.yaml << 'EOF'
          name: livedrop
          description: LiveDrop
          publish_to: none
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            go_router: ^13.0.0
            provider: ^6.1.1
            google_fonts: ^6.2.1
            geolocator: ^10.1.0
            qr_flutter: ^4.1.0
            image_picker: ^1.0.7
            cached_network_image: ^3.3.1
            shared_preferences: ^2.2.2
            fl_chart: ^0.66.2
            intl: ^0.19.0
            uuid: ^4.3.3
            url_launcher: ^6.2.4
            cupertino_icons: ^1.0.6
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.1
          flutter:
            uses-material-design: true
            assets:
              - assets/images/
              - assets/icons/
          EOF
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
      - working-directory: ex/livedrop
        run: |
          mkdir -p assets/images assets/icons
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: LiveDrop-APK
          path: ex/livedrop/build/app/outputs/flutter-apk/app-release.apk
