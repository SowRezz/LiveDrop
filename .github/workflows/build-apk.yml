name: Build LiveDrop APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip livedrop.zip -d ex/
      - name: Patch tout
        working-directory: ex/livedrop
        run: python3 << 'PY'
import os

open('pubspec.yaml','w').write("""name: livedrop
description: LiveDrop
publish_to: none
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  provider: ^6.1.1
  google_fonts: ^6.2.1
  qr_flutter: ^4.1.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  intl: ^0.19.0
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
""")

open('android/app/src/main/AndroidManifest.xml','w').write("""<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <uses-permission android:name="android.permission.INTERNET"/>
    <uses-permission android:name="android.permission.CAMERA"/>
    <application
        android:label="LiveDrop"
        android:name="${applicationName}"
        android:icon="@mipmap/ic_launcher">
        <activity
            android:name=".MainActivity"
            android:exported="true"
            android:launchMode="singleTop"
            android:theme="@style/LaunchTheme"
            android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
            android:hardwareAccelerated="true"
            android:windowSoftInputMode="adjustResize">
            <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme"/>
            <intent-filter>
                <action android:name="android.intent.action.MAIN"/>
                <category android:name="android.intent.category.LAUNCHER"/>
            </intent-filter>
        </activity>
        <meta-data android:name="flutterEmbedding" android:value="2"/>
    </application>
</manifest>
""")

for root,dirs,files in os.walk('lib'):
    for f in files:
        if not f.endswith('.dart'):
            continue
        p = os.path.join(root,f)
        c = open(p).read()
        bad = ['geolocator','firebase','image_picker','cached_network','url_launcher']
        c = '\n'.join(l for l in c.split('\n') if not any(b in l for b in bad))
        open(p,'w').write(c)

os.makedirs('assets/images',exist_ok=True)
os.makedirs('assets/icons',exist_ok=True)
print("Patch termine")
PY
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
      - name: Build APK
        working-directory: ex/livedrop
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: LiveDrop-APK
          path: ex/livedrop/build/app/outputs/flutter-apk/app-release.apk
